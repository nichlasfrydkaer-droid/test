<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobkort 1</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: white;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      width: 100%;
      text-align: center;
      padding: 20px 10px;
      font-size: 20px;
      font-weight: bold;
      background: #1f4e8c;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
    }

    .btn {
      background: #1f4e8c;
      color: white;
      border: none;
      width: 300px;
      padding: 18px 20px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #163a66;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: black;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="header">
    Jobkort 1
  </div>

  <div class="content">

    <div class="title">Jobkort 1</div>

    <a class="btn" href="https://YOUR-ONEDRIVE-LINK-HERE" target="_blank">
      Åbn jobkort
    </a>

    <button class="btn" onclick="alert('Print-funktion kommer senere')">
      Print jobkort
    </button>

  </div>

</body>
</html>
