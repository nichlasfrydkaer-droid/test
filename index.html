<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobkort Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: black;
    }

    .header {
      width: 100%;
      text-align: center;
      padding: 20px 10px;
      font-size: 20px;
      font-weight: bold;
      background: #0b2e5c;
      color: black;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    button {
      background: #0b2e5c;
      color: white; /* rettet til hvid */
      border: none;
      padding: 15px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #081f3f;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="header">
    Jobbkort - Jehovas Vitners Riketssal, Elverum
  </div>

  <div class="container">
    <a href="list.html">
      <button>Se alle jobkort</button>
    </a>
  </div>

</body>
</html>
