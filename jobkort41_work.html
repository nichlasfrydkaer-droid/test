<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41 - Brann og innbruddsalarm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #f4f6f8; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; }
h1 { text-align: center; }

.section { margin-top: 20px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }

label { display: block; margin: 10px 0; }

input[type="checkbox"] { transform: scale(1.2); margin-right: 8px; }

textarea, input[type="text"] {
    width: 100%; padding: 10px;
}

input[type="file"] { margin-top: 10px; }

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#startBtn { background: #28a745; color: white; animation: pulse 1.5s infinite; }
#finishBtn { background: red; color: white; }

.loading { background: #999 !important; }
.success { background: #28a745 !important; }

#status { margin-top: 10px; font-weight: bold; }

@keyframes pulse {
    0% { transform: scale(1); }
    70% { transform: scale(1.03); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - Brann og innbruddsalarm</h1>

<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <button id="startBtn" onclick="startWork()">Start arbeidet</button>
</div>

<div class="section">
    <button id="finishBtn" onclick="endWork()">Ferdigmeld og innsend</button>
    <div id="status"></div>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" class="task" disabled> Test røykmeldere</label>
    <label><input type="checkbox" class="task" disabled> Dokumentasjon MNT</label>
    <label><input type="checkbox" class="task" disabled> Reset brannalarm</label>
    <label><input type="checkbox" class="task" disabled> Test innbruddsalarm</label>
    <label><input type="checkbox" class="task" disabled> Sjekk system</label>
    <label><input type="checkbox" class="task" disabled> Batterisjekk</label>
</div>

<div class="section">
    <strong>Bilder</strong>
    <input type="file" id="photos" accept="image/*" multiple disabled>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime;
let timer;

function setLocked(state) {
    document.querySelectorAll(".task").forEach(c => c.disabled = !state);
    document.getElementById("notes").disabled = !state;
    document.getElementById("photos").disabled = !state;
}

function startWork() {
    startTime = Date.now();
    setLocked(true);

    document.getElementById("startBtn").style.display = "none";

    timer = setInterval(() => {
        let diff = Date.now() - startTime;

        let h = Math.floor(diff / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);

        document.getElementById("timeInput").value =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }, 1000);
}

async function compress(files) {
    const out = [];

    for (const f of files) {
        try {
            const c = await imageCompression(f, {
                maxSizeMB: 0.4,
                maxWidthOrHeight: 1600
            });
            out.push(c);
        } catch (e) {
            out.push(f);
        }
    }

    return out;
}

async function endWork() {

    const btn = document.getElementById("finishBtn");
    const status = document.getElementById("status");

    btn.disabled = true;
    btn.classList.add("loading");
    status.innerText = "Sender...";

    try {

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        let time = document.getElementById("timeInput").value;
        let notes = document.getElementById("notes").value;
        let checks = document.querySelectorAll(".task");

        let y = 10;

        doc.text("Jobbkort 41 - Brann og innbruddsalarm", 10, y);
        y += 10;

        doc.text("Tid: " + time, 10, y);
        y += 10;

        checks.forEach(c => {

            let text = c.parentElement.innerText;

            if (c.checked) {
                doc.setTextColor(0,150,0);
                doc.text("✔ OK", 10, y);
            } else {
                doc.setTextColor(220,0,0);
                doc.text("✘ MANGLER", 10, y);
            }

            doc.setTextColor(0,0,0);
            let lines = doc.splitTextToSize(text, 150);
            doc.text(lines, 35, y);

            y += lines.length * 6 + 3;
        });

        doc.text("Notater:", 10, y + 10);
        doc.text(notes || "-", 10, y + 20);

        const pdfBlob = doc.output("blob");

        const formData = new FormData();
        formData.append("file", pdfBlob, "jobbkort41.pdf");

        const photos = document.getElementById("photos").files;
        const compressed = await compress(photos);

        for (const p of compressed) {
            formData.append("photos", p, p.name);
        }

        const res = await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev", {
            method: "POST",
            body: formData
        });

        const text = await res.text();

        console.log("STATUS:", res.status);
        console.log("BODY:", text);

        if (!res.ok) {
            throw new Error(text);
        }

        btn.classList.remove("loading");
        btn.classList.add("success");
        btn.innerText = "✓ SENDT";
        status.innerText = "Rapport sendt!";

    } catch (err) {

        console.error(err);

        btn.disabled = false;
        btn.classList.remove("loading");
        status.innerText = "Feil: " + err.message;

    }
}

</script>

</body>
</html>
