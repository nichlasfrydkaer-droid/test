<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { max-width:900px; margin:auto; background:white; padding:20px; }
h1 { text-align:center; }

.section { margin-top:20px; padding-bottom:15px; border-bottom:1px solid #ddd; }

button {
  width:100%; padding:16px; font-size:18px;
  border:none; border-radius:8px; cursor:pointer;
}

.start { background:#28a745; color:white; }
.stop { background:red; color:white; display:none; }

textarea { width:100%; padding:10px; }
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41</h1>

<div class="section">
<strong>Tid:</strong>
<input type="text" id="timeInput" disabled>
</div>

<div class="section">
<button class="start" id="startBtn" onclick="startWork()">Start arbejde</button>
<button class="stop" id="stopBtn" onclick="endWork()">Afslut og send</button>
</div>

<div class="section">
<label><input type="checkbox"> Test røykmeldere</label>
<label><input type="checkbox"> Kontroller brannalarm</label>
<label><input type="checkbox"> Test innbruddsalarm</label>
</div>

<div class="section">
<strong>Notater</strong>
<textarea id="notes"></textarea>
</div>

</div>

<script>

let startTime;
let timer;

function startWork() {
    startTime = new Date();

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";

    timer = setInterval(() => {
        let diff = new Date() - startTime;

        let h = Math.floor(diff / 3600000);
        let m = Math.floor(diff % 3600000 / 60000);
        let s = Math.floor(diff % 60000 / 1000);

        document.getElementById("timeInput").value =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }, 1000);
}

async function endWork() {

    clearInterval(timer);

    console.log("ENDWORK STARTED");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let time = document.getElementById("timeInput").value;
    let notes = document.getElementById("notes").value;
    let checks = document.querySelectorAll("input[type='checkbox']");

    let y = 10;

    doc.text("Jobbkort 41", 10, y); y += 10;
    doc.text("Tid: " + time, 10, y); y += 10;

    doc.text("Checkliste:", 10, y); y += 10;

    checks.forEach(c => {
        doc.text("- " + (c.checked ? "OK" : "IKKE OK") + " " + c.parentElement.innerText, 10, y);
        y += 8;
    });

    y += 5;
    doc.text("Notater:", 10, y); y += 10;
    doc.text(notes || "-", 10, y);

    const pdfBlob = doc.output("blob");

    const formData = new FormData();
    formData.append("file", pdfBlob, "jobbkort41.pdf");

    console.log("SENDING TO WORKER");

    const res = await fetch("https://DIN-WORKER.workers.dev", {
        method: "POST",
        body: formData
    });

    console.log("WORKER RESPONSE:", await res.text());

    alert("Sendt!");
}

</script>

</body>
</html>
