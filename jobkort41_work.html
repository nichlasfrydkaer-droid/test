<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41 - Brann og innbruddsalarm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
    font-size: 15px;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    margin-top: 5px;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
}

/* START BUTTON (pulsing) */
.start {
    background: #28a745;
    color: white;
    animation: pulse 1.5s infinite;
}

/* STOP BUTTON */
.stop {
    background: red;
    color: white;
    display: none;
}

/* AFTER SEND STATE */
.sent {
    background: #28a745 !important;
    color: white !important;
}

/* PULSE */
@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.6);
    }
    70% {
        transform: scale(1.02);
        box-shadow: 0 0 0 15px rgba(40, 167, 69, 0);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - Brann og innbruddsalarm</h1>

<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <button class="start" id="startBtn" onclick="startWork()">Start arbeid</button>
    <button class="stop" id="stopBtn" onclick="endWork()">Afslut arbejdet og indsend</button>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" class="task" disabled>
        Test røykmeldere med egnet testgass og kontroller at brannalarmen aktiveres. Test minst 1 forskjellig detektor hver gang. Loggfør hvilken detektor som ble testet i egen kontrolliste.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Sørg for at kontrollen blir dokumentert av vedlikeholdskoordinatoren i MNT-skjema. Hvis noe ikke fungerer så er det viktig at dette blir registrert og at man gjør tiltak for å rette feilen så snart som mulig.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Sjekk om brannalarmen er satt i drift igjen ved å taste alarmkoden.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Aktiver innbruddsalarmen, test funksjonen ved å utløse bevegelsessensor.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Sjekk om innbruddsalarmen er satt i drift igjen ved å taste alarmkoden.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Sjekk datoen for siste batteriskift. Batteriet må maks være 3 år gammelt. (Noter dato på batteriet når det er nytt)
    </label>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime;
let timerInterval;

function setLocked(state) {
    document.querySelectorAll(".task").forEach(c => c.disabled = !state);
    document.getElementById("notes").disabled = !state;
}

function startWork() {
    startTime = new Date();

    setLocked(true);

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";

    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
    let diff = new Date() - startTime;

    let sec = Math.floor(diff / 1000) % 60;
    let min = Math.floor(diff / 60000) % 60;
    let hr = Math.floor(diff / 3600000);

    document.getElementById("timeInput").value =
        String(hr).padStart(2,'0') + ":" +
        String(min).padStart(2,'0') + ":" +
        String(sec).padStart(2,'0');
}

async function endWork() {

    clearInterval(timerInterval);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let time = document.getElementById("timeInput").value;
    let notes = document.getElementById("notes").value;
    let checks = document.querySelectorAll(".task");

    let today = new Date();
    let dateStr = today.toLocaleDateString("no-NO");

    let y = 10;

    doc.setFontSize(18);
    doc.text("Jobbkort 41 - Brann og innbruddsalarm", 10, y);
    y += 10;

    doc.setFontSize(11);
    doc.text("Dato: " + dateStr, 10, y);
    y += 10;

    doc.text("Tid: " + time, 10, y);
    y += 10;

    doc.setFontSize(12);
    doc.text("Kontrolliste:", 10, y);
    y += 10;

    doc.setFontSize(10);

    checks.forEach(c => {
        let status = c.checked ? "OK" : "Mangler";
        let text = c.parentElement.innerText;

        let lines = doc.splitTextToSize(`- ${status} ${text}`, 180);
        doc.text(lines, 10, y);

        y += lines.length * 6;
    });

    y += 5;

    doc.setFontSize(12);
    doc.text("Notater:", 10, y);
    y += 8;

    doc.setFontSize(10);
    doc.text(doc.splitTextToSize(notes || "-", 180), 10, y);

    const pdfBlob = doc.output("blob");

    const formData = new FormData();
    formData.append("file", pdfBlob, "jobbkort41.pdf");

    await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev", {
        method: "POST",
        body: formData
    });

    // 🔥 CHANGE BUTTON STATE INSTEAD OF POPUP
    const btn = document.getElementById("stopBtn");
    btn.innerText = "Innsendt!";
    btn.classList.add("sent");
    btn.disabled = true;

    setLocked(false);
}

</script>

</body>
</html>
