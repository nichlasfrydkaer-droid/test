<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41 - Brann og innbruddsalarm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
}

input[type="file"] {
    margin-top: 10px;
    display: block;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
}

#startBtn {
    background: #28a745;
    color: white;
    animation: pulse 1.5s infinite;
}

#finishBtn {
    background: red;
    color: white;
    display: none;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0.6); }
    70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(40,167,69,0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0); }
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - Brann og innbruddsalarm</h1>

<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <button id="startBtn" onclick="startWork()">Start arbeidet</button>
    <button id="finishBtn" onclick="endWork()">Ferdigmeld og innsend</button>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" class="task" disabled> Test røykmeldere</label>
    <label><input type="checkbox" class="task" disabled> Kontroller brannalarm</label>
    <label><input type="checkbox" class="task" disabled> Test innbruddsalarm</label>
</div>

<!-- 🔥 FIX: TYDELIG BILLEDEKNAP -->
<div class="section">
    <strong>Bilder (kamera / galleri / filer)</strong>

    <input type="file"
           id="photos"
           accept="image/*"
           capture="environment"
           multiple
           disabled>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime;
let timer;

function setLocked(state) {
    document.querySelectorAll(".task").forEach(c => c.disabled = !state);
    document.getElementById("notes").disabled = !state;
    document.getElementById("photos").disabled = !state;
}

function startWork() {
    startTime = new Date();

    setLocked(true);

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("finishBtn").style.display = "block";

    timer = setInterval(() => {
        let diff = new Date() - startTime;

        let h = Math.floor(diff / 3600000);
        let m = Math.floor(diff % 3600000 / 60000);
        let s = Math.floor(diff % 60000 / 1000);

        document.getElementById("timeInput").value =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }, 1000);
}

async function endWork() {

    clearInterval(timer);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let time = document.getElementById("timeInput").value;
    let notes = document.getElementById("notes").value;
    let checks = document.querySelectorAll(".task");

    let y = 10;

    doc.setFontSize(18);
    doc.text("Jobbkort 41 - Brann og innbruddsalarm", 10, y);
    y += 10;

    doc.setFontSize(11);
    doc.text("Tid: " + time, 10, y);
    y += 10;

    doc.setFontSize(12);
    doc.text("Kontrolliste:", 10, y);
    y += 10;

    checks.forEach(c => {

        let text = c.parentElement.innerText;

        if (c.checked) {
            doc.setTextColor(0,150,0);
            doc.setFont(undefined,"bold");
            doc.text("✔ OK", 10, y);
        } else {
            doc.setTextColor(220,0,0);
            doc.setFont(undefined,"bold");
            doc.text("✘ MANGLER", 10, y);
        }

        doc.setTextColor(0,0,0);
        doc.setFont(undefined,"normal");

        let lines = doc.splitTextToSize(text, 150);
        doc.text(lines, 35, y);

        y += lines.length * 6 + 3;
    });

    y += 5;

    doc.setFontSize(12);
    doc.text("Notater:", 10, y);
    y += 8;

    doc.setFontSize(10);
    doc.text(doc.splitTextToSize(notes || "-", 180), 10, y);

    const pdfBlob = doc.output("blob");

    const formData = new FormData();
    formData.append("file", pdfBlob, "jobbkort41.pdf");

    const photos = document.getElementById("photos").files;

    for (let i = 0; i < photos.length; i++) {
        formData.append("photos", photos[i]);
    }

    fetch("https://YOUR-WORKER-URL.workers.dev", {
        method: "POST",
        body: formData
    });

    window.location.href = "ferdig.html";
}

</script>

</body>
</html>
