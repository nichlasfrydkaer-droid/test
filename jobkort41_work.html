<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
    font-size: 15px;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    margin-top: 5px;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
}

.start {
    background: #1f6feb;
    color: white;
}

.stop {
    background: red;
    color: white;
    display: none;
}

#timer {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41</h1>

<div class="section">
    <div id="timer">00:00:00</div>
</div>

<div class="section">
    <button class="start" onclick="startWork()">Start arbeid</button>
    <button class="stop" id="stopBtn" onclick="endWork()">Afslut arbejdet og indsend</button>
</div>

<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" disabled> Test røykmeldere</label>
    <label><input type="checkbox" disabled> Minst 1 detektor testet</label>
    <label><input type="checkbox" disabled> Dokumentert i MNT-skjema</label>
    <label><input type="checkbox" disabled> Brannalarm OK</label>
    <label><input type="checkbox" disabled> Innbruddsalarm testet</label>
    <label><input type="checkbox" disabled> Batteri kontrollert</label>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime;
let timerInterval;

function startWork() {

    startTime = new Date();

    // aktiver felter
    document.querySelectorAll("input[type='checkbox']").forEach(c => c.disabled = false);
    document.getElementById("notes").disabled = false;
    document.getElementById("timeInput").disabled = false;

    // knapper
    document.querySelector(".start").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";

    // timer
    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
    let diff = new Date() - startTime;

    let sec = Math.floor(diff / 1000) % 60;
    let min = Math.floor(diff / (1000 * 60)) % 60;
    let hr = Math.floor(diff / (1000 * 60 * 60));

    let formatted =
        String(hr).padStart(2, '0') + ":" +
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');

    document.getElementById("timer").innerText = formatted;
    document.getElementById("timeInput").value = formatted;
}

function endWork() {

    clearInterval(timerInterval);

    let checks = document.querySelectorAll("input[type='checkbox']");
    let notes = document.getElementById("notes").value;
    let time = document.getElementById("timeInput").value;

    let done = [];
    let missing = [];

    checks.forEach(c => {
        let label = c.parentElement.textContent.trim();
        if (c.checked) done.push(label);
        else missing.push(label);
    });

    let report = {
        jobkort: 41,
        tid: time,
        fullfort: done,
        mangler: missing,
        notater: notes,
        tidspunkt: new Date().toISOString()
    };

    console.log("REPORT:", report);

    alert("Arbejdet er afsluttet – rapport klar til næste step");
}

</script>

</body>
</html>
