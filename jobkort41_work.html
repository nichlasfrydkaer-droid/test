<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    padding-bottom: 80px;
}

h1 { text-align: center; }

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
    line-height: 1.4;
}

input, textarea, button {
    font-size: 16px;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
}

button {
    width: 100%;
    padding: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#startBtn {
    background: #28a745;
    color: white;
}

#finishBtn {
    background: red;
    color: white;
    display: none;
}

#stepStatus {
    padding: 8px;
    background: #eee;
    border-radius: 6px;
    font-weight: bold;
}

.previewGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.previewItem {
    position: relative;
}

.previewItem img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 6px;
}

.removeBtn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41</h1>

<div id="stepStatus">1. Ikke startet</div>

<div class="section">
    <strong>Tid brukt</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <button id="startBtn" onclick="startWork()">Start arbeidet</button>
</div>

<div class="section">
    <button id="finishBtn" onclick="endWork()">Ferdigmeld og send</button>
    <div id="status"></div>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" class="task" disabled>
        Test røykmeldere med testgass og verifiser alarmfunksjon.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Dokumenter kontroll i MNT-system korrekt.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Reset brannalarm og kontroller normal drift.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Test innbruddsalarm via bevegelsessensor.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Bekreft system tilbake i normal status.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Kontroller batteristatus (maks 3 år gammelt).
    </label>
</div>

<div class="section">
    <strong>Bilder</strong>
    <input type="file" id="photos" accept="image/*" multiple disabled>

    <button onclick="resetPhotos()" type="button">🧹 Fjern bilder</button>

    <div class="previewGrid" id="preview"></div>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime = null;
let timer = null;
let selectedPhotos = [];

document.getElementById("photos").addEventListener("change", (e) => {
    selectedPhotos = selectedPhotos.concat(Array.from(e.target.files));
    e.target.value = "";
    renderPreview();
});

function renderPreview() {
    const grid = document.getElementById("preview");
    grid.innerHTML = "";

    selectedPhotos.forEach((file, i) => {
        const url = URL.createObjectURL(file);

        const div = document.createElement("div");
        div.className = "previewItem";

        div.innerHTML = `
            <img src="${url}">
            <button class="removeBtn" onclick="removePhoto(${i})">×</button>
        `;

        grid.appendChild(div);
    });
}

function removePhoto(i) {
    selectedPhotos.splice(i, 1);
    renderPreview();
}

function resetPhotos() {
    selectedPhotos = [];
    renderPreview();
}

function startWork() {
    startTime = Date.now();

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("finishBtn").style.display = "block";

    document.getElementById("stepStatus").innerText = "2. Arbeider";

    setInterval(() => {
        let d = Date.now() - startTime;

        let h = Math.floor(d / 3600000);
        let m = Math.floor(d % 3600000 / 60000);
        let s = Math.floor(d % 60000 / 1000);

        document.getElementById("timeInput").value =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }, 1000);
}

async function compress(files) {
    const out = [];
    for (const f of files) {
        try {
            out.push(await imageCompression(f, {
                maxSizeMB: 0.4,
                maxWidthOrHeight: 1600
            }));
        } catch {
            out.push(f);
        }
    }
    return out;
}

async function endWork() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 10;

    doc.text("Jobbkort 41", 10, y);
    y += 10;

    doc.text("Kontrolliste", 10, y);
    y += 10;

    // HEADER
    doc.setFont(undefined, "bold");
    doc.text("STATUS", 10, y);
    doc.text("OPPGAVE", 65, y);
    doc.setFont(undefined, "normal");
    y += 6;

    doc.line(10, y, 200, y);
    y += 8;

    // FIXED COLUMN LAYOUT
    document.querySelectorAll(".task").forEach(c => {

        const text = c.parentElement.innerText;

        const statusX = 10;
        const textX = 65;      // 👈 FIX: langt nok til højre
        const maxWidth = 125;   // 👈 ingen overlap

        if (c.checked) {
            doc.setTextColor(0,150,0);
            doc.text("OK", statusX, y);
        } else {
            doc.setTextColor(200,0,0);
            doc.text("MANGLER", statusX, y);
        }

        doc.setTextColor(0,0,0);

        const lines = doc.splitTextToSize(text, maxWidth);
        doc.text(lines, textX, y);

        y += lines.length * 6 + 4;
    });

    // NOTES
    y += 10;
    doc.text("Notater:", 10, y);
    y += 6;

    doc.text(document.getElementById("notes").value || "-", 10, y);

    const pdfBlob = doc.output("blob");

    const formData = new FormData();
    formData.append("file", pdfBlob, "jobbkort41.pdf");

    const compressed = await compress(selectedPhotos);

    for (const p of compressed) {
        formData.append("photos", p, p.name);
    }

    await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev", {
        method: "POST",
        body: formData
    }).catch(() => {});

    window.location.href = "ferdig.html";
}

</script>

</body>
</html>
