<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { max-width:900px; margin:auto; background:white; padding:20px; }

h1 { text-align:center; }

.section {
  margin-top:20px;
  padding-bottom:15px;
  border-bottom:1px solid #ddd;
}

label {
  display:block;
  margin:10px 0;
  line-height:1.4;
}

input, textarea, button {
  font-size:16px;
}

input[type="checkbox"] {
  transform:scale(1.2);
  margin-right:8px;
}

textarea, input[type="text"] {
  width:100%;
  padding:10px;
}

button {
  width:100%;
  padding:16px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#startBtn { background:#28a745; color:white; }
#finishBtn { background:red; color:white; display:none; }

.previewGrid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.previewItem { position:relative; }

.previewItem img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.removeBtn {
  position:absolute;
  top:4px;
  right:4px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - BRANN OG INNBRUDDSALARM</h1>

<div class="section">
  <strong>Tid brukt</strong>
  <input type="text" id="timeInput" disabled>
</div>

<div class="section">
  <button id="startBtn" onclick="startWork()">Start arbeidet</button>
</div>

<div class="section">
  <button id="finishBtn" onclick="endWork()">Ferdigmeld og send</button>
</div>

<div class="section">
  <strong>Kontrolliste</strong>

  <label><input type="checkbox" class="task" disabled>
    Test røykmeldere med testgass og verifiser korrekt alarmrespons
  </label>

  <label><input type="checkbox" class="task" disabled>
    Dokumenter kontroll i MNT-systemet
  </label>

  <label><input type="checkbox" class="task" disabled>
    Reset brannalarm etter testing
  </label>

  <label><input type="checkbox" class="task" disabled>
    Test innbruddsalarm via bevegelsessensor
  </label>

  <label><input type="checkbox" class="task" disabled>
    Bekreft normal drift etter test
  </label>

  <label><input type="checkbox" class="task" disabled>
    Sjekk batteristatus (maks 3 år)
  </label>
</div>

<div class="section">
  <strong>Bilder</strong>
  <input type="file" id="photos" accept="image/*" multiple disabled>
  <button onclick="resetPhotos()" type="button">🧹 Fjern bilder</button>
  <div class="previewGrid" id="preview"></div>
</div>

<div class="section">
  <strong>Notater</strong>
  <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime=null;
let selectedPhotos=[];

document.getElementById("photos").addEventListener("change",(e)=>{
  selectedPhotos=selectedPhotos.concat(Array.from(e.target.files));
  e.target.value="";
  renderPreview();
});

function renderPreview(){
  const grid=document.getElementById("preview");
  grid.innerHTML="";

  selectedPhotos.forEach((f,i)=>{
    const url=URL.createObjectURL(f);
    const div=document.createElement("div");
    div.className="previewItem";
    div.innerHTML=`
      <img src="${url}">
      <button class="removeBtn" onclick="removePhoto(${i})">×</button>
    `;
    grid.appendChild(div);
  });
}

function removePhoto(i){
  selectedPhotos.splice(i,1);
  renderPreview();
}

function resetPhotos(){
  selectedPhotos=[];
  renderPreview();
}

function startWork(){
  startTime=Date.now();

  document.querySelectorAll(".task").forEach(e=>e.disabled=false);
  document.getElementById("notes").disabled=false;
  document.getElementById("photos").disabled=false;

  document.getElementById("startBtn").style.display="none";
  document.getElementById("finishBtn").style.display="block";

  setInterval(()=>{
    let d=Date.now()-startTime;
    let h=Math.floor(d/3600000);
    let m=Math.floor(d%3600000/60000);
    let s=Math.floor(d%60000/1000);

    document.getElementById("timeInput").value=
      String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
  },1000);
}

async function compress(files){
  const out=[];
  for(const f of files){
    try{
      out.push(await imageCompression(f,{
        maxSizeMB:0.4,
        maxWidthOrHeight:1600
      }));
    }catch{
      out.push(f);
    }
  }
  return out;
}

async function endWork(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=12;

  doc.setFontSize(18);
  doc.setFont(undefined,"bold");
  doc.text("JOBBKORT 41 - BRANN OG INNBRUDDSALARM",10,y);

  y+=10;

  doc.setFontSize(10);
  doc.setFont(undefined,"normal");

  doc.text("Kontrolliste",10,y);
  y+=8;

  doc.setFont(undefined,"bold");
  doc.text("STATUS",10,y);
  doc.text("OPPGAVE",65,y);
  doc.setFont(undefined,"normal");

  y+=6;
  doc.line(10,y,200,y);
  y+=8;

  document.querySelectorAll(".task").forEach(c=>{

    const text=c.parentElement.innerText;

    const statusX=10;
    const textX=65;
    const maxWidth=125;

    if(c.checked){
      doc.setTextColor(0,140,0);
      doc.text("UTFØRT ✓",statusX,y);
    }else{
      doc.setTextColor(200,0,0);
      doc.text("IKKE UTFØRT ✗",statusX,y);
    }

    doc.setTextColor(0,0,0);

    const lines=doc.splitTextToSize(text,maxWidth);
    doc.text(lines,textX,y);

    y+=lines.length*6+4;
  });

  y+=10;

  doc.setFont(undefined,"bold");
  doc.setFontSize(12);
  doc.text("NOTATER",10,y);
  y+=8;

  doc.setFont(undefined,"normal");
  doc.setFontSize(9);

  const notes=document.getElementById("notes").value||"-";
  const noteLines=doc.splitTextToSize(notes,180);
  doc.text(noteLines,10,y);

  y+=noteLines.length*5+10;

  doc.setFont(undefined,"bold");
  doc.setFontSize(11);
  doc.text(`Vedlagte bilder: ${selectedPhotos.length}`,10,y);

  const pdfBlob=doc.output("blob");

  const formData=new FormData();
  formData.append("file",pdfBlob,"jobbkort.pdf");

  const compressed=await compress(selectedPhotos);

  for(const p of compressed){
    formData.append("photos",p,p.name);
  }

  await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev",{
    method:"POST",
    body:formData
  }).catch(()=>{});

  window.location.href="ferdig.html";
}

</script>

</body>
</html>
