<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41 - Brann og innbruddsalarm</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    padding-bottom: 80px;
}

h1 { text-align: center; }

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
    font-size: 15px;
    line-height: 1.4;
}

input, textarea, button {
    font-size: 16px;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
}

button {
    width: 100%;
    padding: 16px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
}

#startBtn {
    background: #28a745;
    color: white;
    animation: pulse 1.5s infinite;
}

#finishBtn {
    background: red;
    color: white;
    display: none;
}

.loading {
    background: #777 !important;
}

.success {
    background: #28a745 !important;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}

#stepStatus {
    font-weight: bold;
    margin-top: 10px;
    padding: 8px;
    background: #eee;
    border-radius: 6px;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0.6); }
    70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(40,167,69,0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0); }
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - Brann og innbruddsalarm</h1>

<div id="stepStatus">1. Ikke startet</div>

<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<div class="section">
    <button id="startBtn" onclick="startWork()">Start arbeidet</button>
</div>

<div class="section">
    <button id="finishBtn" onclick="endWork()">Ferdigmeld og innsend</button>
    <div id="status"></div>
</div>

<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" class="task" disabled>
        Test røykmeldere med egnet testgass og kontroller at brannalarmen aktiveres korrekt.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Sørg for korrekt dokumentasjon i MNT-skjema av vedlikeholdskoordinator.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Kontroller at brannalarmen er resatt og tilbake i normal drift etter testing.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Test innbruddsalarm ved å utløse bevegelsessensor og verifiser respons.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Bekreft at innbruddsalarm er tilbake i normal drift etter test.
    </label>

    <label><input type="checkbox" class="task" disabled>
        Kontroller batteristatus (maks 3 år gammelt).
    </label>
</div>

<div class="section">
    <strong>Bilder</strong>
    <input type="file" id="photos" accept="image/*" multiple disabled>
</div>

<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime = null;
let timer = null;

function setStep(step) {
    const map = {
        1: "1. Ikke startet",
        2: "2. Arbeider",
        3: "3. Sender",
        4: "4. Ferdig"
    };
    document.getElementById("stepStatus").innerText = map[step];
}

function setLocked(state) {
    document.querySelectorAll(".task").forEach(c => c.disabled = !state);
    document.getElementById("notes").disabled = !state;
    document.getElementById("photos").disabled = !state;
}

function startWork() {
    startTime = Date.now();
    setLocked(true);

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("finishBtn").style.display = "block";

    setStep(2);

    timer = setInterval(() => {
        let diff = Date.now() - startTime;

        let h = Math.floor(diff / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);

        document.getElementById("timeInput").value =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }, 1000);
}

async function compress(files) {
    const out = [];
    for (const f of files) {
        try {
            out.push(await imageCompression(f, {
                maxSizeMB: 0.4,
                maxWidthOrHeight: 1600
            }));
        } catch {
            out.push(f);
        }
    }
    return out;
}

async function endWork() {

    if (!startTime) {
        alert("Start arbeidet først");
        return;
    }

    const btn = document.getElementById("finishBtn");
    const status = document.getElementById("status");

    btn.disabled = true;
    btn.classList.add("loading");

    setStep(3);
    status.innerText = "Sender rapport...";

    try {

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        let time = document.getElementById("timeInput").value;
        let notes = document.getElementById("notes").value;
        let checks = document.querySelectorAll(".task");

        let y = 10;

        // HEADER
        doc.setFontSize(16);
        doc.text("Jobbkort 41 - Brann og innbruddsalarm", 10, y);
        y += 12;

        doc.setFontSize(11);
        doc.text("Tid: " + time, 10, y);
        y += 10;

        doc.setFontSize(12);
        doc.text("Kontrolliste:", 10, y);
        y += 10;

        // COLUMN HEADERS
        doc.setFont(undefined, "bold");
        doc.text("STATUS", 10, y);
        doc.text("OPPGAVE", 40, y);
        doc.setFont(undefined, "normal");
        y += 6;

        // LINE
        doc.line(10, y, 200, y);
        y += 6;

        // ROWS
        checks.forEach(c => {

            let text = c.parentElement.innerText;

            if (c.checked) {
                doc.setTextColor(0,150,0);
                doc.text("✔ OK", 10, y);
            } else {
                doc.setTextColor(220,0,0);
                doc.text("✘ MANGLER", 10, y);
            }

            doc.setTextColor(0,0,0);

            const lines = doc.splitTextToSize(text, 150);
            doc.text(lines, 40, y);

            y += lines.length * 6 + 4;
        });

        y += 5;
        doc.text("Notater:", 10, y);
        y += 8;

        const noteLines = doc.splitTextToSize(notes || "-", 180);
        doc.text(noteLines, 10, y);

        const pdfBlob = doc.output("blob");

        const formData = new FormData();
        formData.append("file", pdfBlob, "jobbkort41.pdf");

        const photos = document.getElementById("photos").files;
        const compressed = await compress(photos);

        for (const p of compressed) {
            formData.append("photos", p, p.name);
        }

        await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev", {
            method: "POST",
            body: formData
        }).catch(() => {});

        window.location.href = "ferdig.html";

    } catch (err) {
        console.error(err);

        btn.disabled = false;
        btn.classList.remove("loading");

        setStep(2);
        status.innerText = "Feil ved sending";
    }
}

</script>

</body>
</html>
