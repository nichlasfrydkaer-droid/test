<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41 - Brann og innbruddsalarm</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}

label {
    display: block;
    margin: 10px 0;
    font-size: 15px;
}

input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
}

textarea, input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    margin-top: 5px;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 10px;
}

.start {
    background: #28a745;
    color: white;
}

.stop {
    background: red;
    color: white;
    display: none;
}

#timer {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin: 10px 0;
}

.small {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - Brann og innbruddsalarm</h1>

<!-- 🔴 ORIGINAL TEKST (100% UNCHANGED) -->
<div class="section small">
Teknisk vedlikehold
</div>

<!-- TIMER -->
<div class="section">
    <div id="timer">00:00:00</div>
</div>

<!-- START / STOP -->
<div class="section">
    <button class="start" onclick="startWork()">Start arbeid</button>
    <button class="stop" id="stopBtn" onclick="endWork()">Afslut arbejdet og indsend</button>
</div>

<!-- TID -->
<div class="section">
    <strong>Tid brukt på jobb</strong>
    <input type="text" id="timeInput" disabled>
</div>

<!-- CHECKLIST -->
<div class="section">
    <strong>Kontrolliste</strong>

    <label><input type="checkbox" disabled> Test røykmeldere med egnet testgass og kontroller at brannalarmen aktiveres. Test minst 1 forskjellig detektor hver gang. Loggfør hvilken detektor som ble testet i egen kontrolliste.</label>

    <label><input type="checkbox" disabled> Sørg for at kontrollen blir dokumentert av vedlikeholdskoordinatoren i MNT-skjema. Hvis noe ikke fungerer så er det viktig at dette blir registrert og at man gjør tiltak for å rette feilen så snart som mulig.</label>

    <label><input type="checkbox" disabled> Sjekk om brannalarmen er satt i drift igjen ved å taste alarmkoden.</label>

    <label><input type="checkbox" disabled> Aktiver innbruddsalarmen, test funksjonen ved å utløse bevegelsessensor.</label>

    <label><input type="checkbox" disabled> Sjekk om innbruddsalarmen er satt i drift igjen ved å taste alarmkoden.</label>

    <label><input type="checkbox" disabled> Sjekk datoen for siste batteriskift. Batteriet må maks være 3 år gammelt. (Noter dato på batteriet når det er nytt)</label>
</div>

<!-- NOTES -->
<div class="section">
    <strong>Notater</strong>
    <textarea id="notes" disabled></textarea>
</div>

</div>

<script>

let startTime;
let timerInterval;

function startWork() {

    startTime = new Date();

    // aktiver ALT først ved start
    document.querySelectorAll("input[type='checkbox']").forEach(c => c.disabled = false);
    document.querySelectorAll("textarea").forEach(t => t.disabled = false);
    document.querySelectorAll("input[type='text']").forEach(t => t.disabled = false);

    document.querySelector(".start").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";

    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
    let diff = new Date() - startTime;

    let sec = Math.floor(diff / 1000) % 60;
    let min = Math.floor(diff / (1000 * 60)) % 60;
    let hr = Math.floor(diff / (1000 * 60 * 60));

    let formatted =
        String(hr).padStart(2,'0') + ":" +
        String(min).padStart(2,'0') + ":" +
        String(sec).padStart(2,'0');

    document.getElementById("timer").innerText = formatted;
    document.getElementById("timeInput").value = formatted;
}

function endWork() {

    clearInterval(timerInterval);

    let checks = document.querySelectorAll("input[type='checkbox']");
    let notes = document.getElementById("notes").value;
    let time = document.getElementById("timeInput").value;

    let done = [];
    let missing = [];

    checks.forEach(c => {
        let label = c.parentElement.textContent.trim();
        if (c.checked) done.push(label);
        else missing.push(label);
    });

    let report = {
        jobkort: 41,
        tid: time,
        fullfort: done,
        mangler: missing,
        notater: notes,
        tidspunkt: new Date().toISOString()
    };

    console.log("REPORT:", report);
    alert("Jobbkort afsluttet – klar til backend");
}

</script>

</body>
</html>
