<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort Liste</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.button-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1f6feb;
    color: white;
}

button:hover {
    background: #0f4fc2;
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT</h1>

<div class="button-grid" id="list"></div>

</div>

<script>
const list = document.getElementById("list");

for (let i = 1; i <= 41; i++) {

    // format 01, 02, 03...
    const id = String(i).padStart(2, "0");

    const btn = document.createElement("button");
    btn.innerText = "Jobbkort " + id;

    btn.onclick = () => {
        window.location.href = `jobkort${id}.html`;
    };

    list.appendChild(btn);
}
</script>

</body>
</html>
