<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jobbkort 41</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { max-width:900px; margin:auto; background:white; padding:20px; }

h1 { text-align:center; }

.section {
  margin-top:20px;
  padding-bottom:15px;
  border-bottom:1px solid #ddd;
}

label {
  display:block;
  margin:10px 0;
  line-height:1.4;
}

input, textarea, button {
  font-size:16px;
}

/* ✅ FIX: iPhone visibility for name input */
#nameInput {
  width:100%;
  padding:12px;
  border:2px solid #ccc;
  border-radius:6px;
  background:white;
  color:black;
  font-size:16px;
  -webkit-appearance:none;
  appearance:none;
}

input[type="checkbox"] {
  transform:scale(1.2);
  margin-right:8px;
}

textarea {
  width:100%;
  padding:10px;
}

button {
  width:100%;
  padding:16px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#startBtn { background:#28a745; color:white; animation:pulse 1.5s infinite; }
#finishBtn { background:red; color:white; display:none; }

.previewGrid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.previewItem {
  position:relative;
  cursor:grab;
}

.previewItem img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.removeBtn {
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:20px;
  height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.fullscreen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.fullscreen img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* pulse animation */
@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0.6); }
  70% { transform: scale(1.03); box-shadow: 0 0 0 14px rgba(40,167,69,0); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,167,69,0); }
}
</style>
</head>

<body>

<div class="container">

<h1>JOBBKORT 41 - BRANN OG INNBRUDDSALARM</h1>

<div class="section">
  <strong>Tid brukt</strong>
  <input type="text" id="timeInput" disabled>
</div>

<div class="section">
  <strong>Navn</strong>
  <input type="text" id="nameInput" disabled>
</div>

<div class="section">
  <button id="startBtn" onclick="startWork()">Start arbeidet</button>
</div>

<div class="section">
  <button id="finishBtn" onclick="endWork()">Ferdigmeld og send</button>
</div>

<div class="section">

  <div style="font-size:14px; line-height:1.4; margin-bottom:10px;">
    MERK: Siden brannalarmen er koblet sammen med innbruddsalarmen, sørg for å ha koden til
    alarmen nedskrevet før videre arbeid. Kontrolliste for brannalarm brukes for å loggføre test av røykmeldere.
  </div>

  <strong>Kontrolliste</strong>

  <label><input type="checkbox" class="task" disabled>
    Test røykmeldere med egnet testgass og kontroller at brannalarmen aktiveres. Test minst 1 forskjellig detektor hver gang. Loggfør hvilken detektor som ble testet i egen kontrolliste.
  </label>

  <label><input type="checkbox" class="task" disabled>
    Sørg for at kontrollen blir dokumentert av vedlikeholdskoordinatoren i MNT-skjema. Hvis noe ikke fungerer så er det viktig at dette blir registrert og at man gjør tiltak for å rette feilen så snart som mulig.
  </label>

  <label><input type="checkbox" class="task" disabled>
    Sjekk om brannalarmen er satt i drift igjen ved å taste alarmkoden.
  </label>

  <label><input type="checkbox" class="task" disabled>
    Aktiver innbruddsalarmen, test funksjonen ved å utløse bevegelsessensor.
  </label>

  <label><input type="checkbox" class="task" disabled>
    Sjekk om innbruddsalarmen er satt i drift igjen ved å taste alarmkoden.
  </label>

  <label><input type="checkbox" class="task" disabled>
    Sjekk datoen for siste batteriskift. Batteriet må maks være 3 år gammelt. (Noter dato på batteriet når det er nytt)
  </label>
</div>

<div class="section">
  <strong>Bilder</strong>
  <input type="file" id="photos" accept="image/*" multiple disabled>
  <div class="previewGrid" id="preview"></div>
</div>

<div class="section">
  <strong>Notater</strong>
  <textarea id="notes" disabled></textarea>
</div>

</div>

<div id="fullscreen" class="fullscreen" style="display:none" onclick="closeFull()">
  <img id="fullImg">
</div>

<script>

let startTime=null;
let selectedPhotos=[];

document.getElementById("photos").addEventListener("change",(e)=>{
  selectedPhotos = selectedPhotos.concat(Array.from(e.target.files));
  e.target.value="";
  renderPreview();
});

function renderPreview(){
  const grid=document.getElementById("preview");
  grid.innerHTML="";

  selectedPhotos.forEach((f,i)=>{
    const url=URL.createObjectURL(f);

    const div=document.createElement("div");
    div.className="previewItem";

    div.innerHTML=`
      <img src="${url}" onclick="openFull('${url}')">
      <button class="removeBtn" onclick="removePhoto(event,${i})">×</button>
    `;

    grid.appendChild(div);
  });
}

function removePhoto(e,i){
  e.stopPropagation();
  selectedPhotos.splice(i,1);
  renderPreview();
}

function openFull(url){
  document.getElementById("fullImg").src=url;
  document.getElementById("fullscreen").style.display="flex";
}

function closeFull(){
  document.getElementById("fullscreen").style.display="none";
}

function startWork(){
  startTime=Date.now();

  document.querySelectorAll(".task").forEach(e=>e.disabled=false);
  document.getElementById("notes").disabled=false;
  document.getElementById("photos").disabled=false;
  document.getElementById("nameInput").disabled=false;

  document.getElementById("startBtn").style.display="none";
  document.getElementById("finishBtn").style.display="block";

  setInterval(()=>{
    let d=Date.now()-startTime;
    document.getElementById("timeInput").value =
      new Date(d).toISOString().substr(11,8);
  },1000);
}

async function compress(files){
  const out=[];
  for(const f of files){
    try{
      out.push(await imageCompression(f,{
        maxSizeMB:0.4,
        maxWidthOrHeight:1600
      }));
    }catch{
      out.push(f);
    }
  }
  return out;
}

async function endWork(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=12;

  doc.setFontSize(18);
  doc.text("JOBBKORT 41 - BRANN OG INNBRUDDSALARM",10,y);
  y+=10;

  const name = (document.getElementById("nameInput").value || "").trim() || "-";
  doc.setFontSize(10);
  doc.text("Navn: " + name, 10, y);
  y+=10;

  document.querySelectorAll(".task").forEach(c=>{
    const text=c.parentElement.textContent.trim();

    doc.setFontSize(7);
    doc.text(c.checked ? "UTFØRT" : "IKKE UTFØRT", 10, y);

    const lines=doc.splitTextToSize(text,120);
    doc.text(lines,60,y);

    y+=lines.length*5;
  });

  const notes = (document.getElementById("notes").value || "").trim() || "-";

  doc.setFontSize(9);
  doc.text("NOTATER",10,y+10);
  doc.setFontSize(8);
  doc.text(doc.splitTextToSize(notes,180),10,y+18);

  const pdfBlob=doc.output("blob");

  const formData=new FormData();
  formData.append("file",pdfBlob,"jobbkort.pdf");

  const compressed=await compress(selectedPhotos);
  for(const p of compressed){
    formData.append("photos",p,p.name);
  }

  await fetch("https://jobbkort-mail.nichlasfrydkaer.workers.dev",{
    method:"POST",
    body:formData
  });

  /* 📱 iPhone SAFE redirect */
  setTimeout(() => {
    window.location.href = "ferdig.html";
  }, 800);
}

</script>

</body>
</html>
